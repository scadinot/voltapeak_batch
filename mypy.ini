# -----------------------------------------------------------------------------
# mypy.ini — Configuration Mypy (format INI).
#
# Extrait de l'ancien `[tool.mypy]` de pyproject.toml. Section unique
# `[mypy]`, valeurs INI (booléens en True/False capitalisés).
# -----------------------------------------------------------------------------

[mypy]
python_version = 3.10
ignore_missing_imports = True
warn_unused_ignores = True
# ignore_missing_imports : pybaselines, scipy ont des stubs partiels ou absents.
